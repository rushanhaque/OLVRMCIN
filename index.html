        // Lightbox Modal State
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        function openLightbox(src, alt) {
            const lightbox = document.getElementById('imageLightbox');
            const img = document.getElementById('lightboxImage');
            img.src = src;
            img.alt = alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            resetZoomState();
        }

        function closeLightbox(event) {
            const lightbox = document.getElementById('imageLightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateImageTransform() {
            const img = document.getElementById('lightboxImage');
            img.style.transform = `scale(${zoomLevel}) translate(${panX / zoomLevel}px, ${panY / zoomLevel}px)`;
        }

        function zoomIn(event) {
            if (event) event.stopPropagation();
            if (zoomLevel < 4) {
                zoomLevel += 0.5;
                updateImageTransform();
            }
        }

        function zoomOut(event) {
            if (event) event.stopPropagation();
            if (zoomLevel > 1) {
                zoomLevel -= 0.5;
                if (zoomLevel === 1) {
                    panX = 0;
                    panY = 0;
                }
                updateImageTransform();
            }
        }

        function resetZoom(event) {
            if (event) event.stopPropagation();
            resetZoomState();
        }

        function resetZoomState() {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            updateImageTransform();
            const img = document.getElementById('lightboxImage');
            img.style.cursor = 'zoom-in';
        }

        // --- PRESENTATION MODE CONTROLS ---
        let isPresentationMode = false;
        let currentPresentationPage = 0;

        function enterPresentation() {
            isPresentationMode = true;
            document.body.classList.add('presentation-active');
            
            // Find closest page to current scroll position
            const pages = document.querySelectorAll('.catalog-page');
            let closestIndex = 0;
            let minDistance = Infinity;
            
            pages.forEach((page, idx) => {
                const rect = page.getBoundingClientRect();
                const dist = Math.abs(rect.top);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestIndex = idx;
                }
            });
            
            currentPresentationPage = closestIndex;
            updatePresentationView();
            
            // Toggle fullscreen
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Fullscreen error: ${err.message}`);
                });
            }
            
            const btn = document.getElementById('presentationBtn');
            if (btn) btn.innerHTML = '<i class="fa-solid fa-compress"></i>';
        }

        function exitPresentation() {
            isPresentationMode = false;
            document.body.classList.remove('presentation-active');
            
            const pages = document.querySelectorAll('.catalog-page');
            pages.forEach(page => {
                page.classList.remove('presentation-current');
                page.style.transform = '';
                page.style.position = '';
                page.style.top = '';
                page.style.left = '';
            });
            
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(err => {});
            }
            
            const btn = document.getElementById('presentationBtn');
            if (btn) btn.innerHTML = '<i class="fa-solid fa-expand"></i>';
            
            if (pages[currentPresentationPage]) {
                pages[currentPresentationPage].scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        function updatePresentationView() {
            const pages = document.querySelectorAll('.catalog-page');
            pages.forEach((page, idx) => {
                if (idx === currentPresentationPage) {
                    page.classList.add('presentation-current');
                } else {
                    page.classList.remove('presentation-current');
                    page.style.transform = '';
                    page.style.position = '';
                    page.style.top = '';
                    page.style.left = '';
                }
            });
            
            const presPageNum = document.getElementById('presPageNum');
            if (presPageNum) {
                presPageNum.textContent = `${currentPresentationPage + 1} / ${pages.length}`;
            }
            resizePresentationPage();
        }

        function nextPresentationPage() {
            const pages = document.querySelectorAll('.catalog-page');
            if (currentPresentationPage < pages.length - 1) {
                currentPresentationPage++;
                updatePresentationView();
            }
        }

        function prevPresentationPage() {
            if (currentPresentationPage > 0) {
                currentPresentationPage--;
                updatePresentationView();
            }
        }

        function resizePresentationPage() {
            if (!isPresentationMode) return;
            const activePage = document.querySelector('.catalog-page.presentation-current');
            if (!activePage) return;
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const pageWidth = 1122.5; 
            const pageHeight = 793.7; 
            
            const scaleX = windowWidth / pageWidth;
            const scaleY = windowHeight / pageHeight;
            const scale = Math.min(scaleX, scaleY) * 0.95; 
            
            activePage.style.transform = `translate(-50%, -50%) scale(${scale})`;
            activePage.style.position = 'fixed';
            activePage.style.top = '50%';
            activePage.style.left = '50%';
        }

            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {

                nextPresentationPage();

                                    <div class="premium-form-group">
                                        <label for="contactName">${t('contactLabelName')}</label>
                                        <input type="text" id="contactName" name="name" required placeholder="${t('contactPlaceholderName')}">
                                    </div>
                                    <div class="premium-form-group">
                                        <label for="contactEmail">${t('contactLabelEmail')}</label>
                                        <input type="email" id="contactEmail" name="email" required placeholder="${t('contactPlaceholderEmail')}">
                                    </div>
                                </div>
                                <div class="premium-form-group">
                                    <label for="contactMessage">${t('contactLabelMessage')}</label>
                                    <textarea id="contactMessage" name="message" rows="4" required placeholder="${t('contactPlaceholderMsg')}"></textarea>
                                </div>
                                <button type="submit" class="premium-submit-btn">${t('contactSubmitBtn')}</button>
                            </form>
                        </div>
                        
                        <div class="contact-right">
                            <div class="map-wrapper">
                                <div class="map-frame">
                                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3493.2893861856187!2d78.7246836!3d28.8897475!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390afede7aaaaaab%3A0xabf6c75776458bca!2sOliver%20McInroy%20%26%20Co.!5e0!3m2!1sen!2sin!4v1716300000000!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                                </div>
                                <div class="map-pin-overlay">
                                    <i class="fa-solid fa-location-dot"></i>
                                </div>
                            </div>
                            <div class="address-block">
                                <div class="address-icon">
                                    <i class="fa-solid fa-map-marker-alt"></i>
                                </div>
                                <div class="address-text">
                                    <h4>${t('contactWorkshop')}</h4>
                                    <p>${t('contactAddress')}</p>
                                </div>
                            </div>
                            <div class="contact-details-block">
                                <div class="contact-detail-item">
                                    <i class="fa-solid fa-envelope"></i>
                                    <a href="mailto:info@olivermcinroy.com">info@olivermcinroy.com</a>
                                </div>
                                <div class="contact-detail-item">
                                    <i class="fa-brands fa-whatsapp"></i>
                                    <a href="https://wa.me/919917078766" target="_blank">+91 9917078766</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="page-footer">
                        <span>${t('pageLabel')} ${currentPageNumber} ${t('pageOfLabel')} ${totalPages}</span>
                    </div>
                `;
                catalogViewport.appendChild(contactPage);

                if (isPresentationMode) {
                    updatePresentationView();
                }
            }
            
            // Set up search filter logic
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query === '') {
                    currentFilteredItems = window.catalogData || [];
                } else {
                    currentFilteredItems = (window.catalogData || []).filter(item => {
                        const trans = productTranslations[currentLanguage]?.[item.sku];
                        const name = (trans?.name || item.name).toLowerCase();
                        const desc = (trans?.description || item.description).toLowerCase();
                        const sku = item.sku.toLowerCase();
                        return name.includes(query) || sku.includes(query) || desc.includes(query) ||
                               item.name.toLowerCase().includes(query) || item.description.toLowerCase().includes(query);
                    });
                }
                
                renderCatalog(currentFilteredItems);
            });

            // Bind click listeners for Controls
            const pdfBtn = document.getElementById('pdfBtn');
            if (pdfBtn) {
                pdfBtn.addEventListener('click', () => {
                    window.print();
                });
            }

            const presentationBtn = document.getElementById('presentationBtn');
            if (presentationBtn) {
                presentationBtn.addEventListener('click', () => {
                    if (isPresentationMode) {
                        exitPresentation();
                    } else {
                        enterPresentation();
                    }
                });
            }

            const langSelect = document.getElementById('langSelect');
            if (langSelect) {
                langSelect.addEventListener('change', (e) => {
                    currentLanguage = e.target.value;
                    updateUIForLanguage();
                    renderCatalog(currentFilteredItems);
                });
            }

            const presPrevBtn = document.getElementById('presPrevBtn');
            if (presPrevBtn) presPrevBtn.addEventListener('click', prevPresentationPage);

            const presNextBtn = document.getElementById('presNextBtn');
            if (presNextBtn) presNextBtn.addEventListener('click', nextPresentationPage);

            const presExitBtn = document.getElementById('presExitBtn');
            if (presExitBtn) presExitBtn.addEventListener('click', exitPresentation);

            // --- LIGHTBOX INTERACTIVE ZOOM & PAN LISTENERS ---
            const lightboxImage = document.getElementById('lightboxImage');

            // Mouse dragging to pan
            lightboxImage.addEventListener('mousedown', (e) => {
                if (zoomLevel > 1) {
                    isDragging = true;
                    startX = e.clientX - panX;
                    startY = e.clientY - panY;
                    lightboxImage.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    panX = e.clientX - startX;
                    panY = e.clientY - startY;
                    
                    const maxPan = (zoomLevel - 1) * 350;
                    panX = Math.max(-maxPan, Math.min(maxPan, panX));
                    panY = Math.max(-maxPan, Math.min(maxPan, panY));
                    
                    updateImageTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    lightboxImage.style.cursor = zoomLevel > 1 ? 'grab' : 'zoom-in';
                }
            });

            lightboxImage.addEventListener('wheel', (e) => {
                if (document.getElementById('imageLightbox').classList.contains('active')) {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        zoomIn();
                    } else {
                        zoomOut();
                    }
                }
            }, { passive: false });

            lightboxImage.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (zoomLevel > 1) {
                    resetZoomState();
                } else {
                    zoomLevel = 2.5;
                    updateImageTransform();
                    lightboxImage.style.cursor = 'grab';
                }
            });
            
            // Initial render
            if (window.catalogData) {
                renderCatalog(window.catalogData);
            } else {
                catalogViewport.innerHTML = '<div style="text-align:center; padding: 40px;">Error: Catalog data not found.</div>';
            }

            // Contact form handler
            window.handleContactSubmit = function(e) {
                e.preventDefault();
                const form = e.target;
                const name = form.querySelector('#contactName').value;
                const email = form.querySelector('#contactEmail').value;
                const message = form.querySelector('#contactMessage').value;
                
                const subject = encodeURIComponent(`Enquiry from ${name}`);
                const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
                
                window.location.href = `mailto:info@olivermcinroy.com?subject=${subject}&body=${body}`;
            };
        });
    </script>

    <!-- Lightbox Modal container -->
    <div id="imageLightbox" class="lightbox no-print" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <img id="lightboxImage" class="lightbox-content" src="" alt="Enlarged Product Image" onclick="event.stopPropagation()">
    </div>

    <!-- Presentation Mode Floating controls -->
    <div id="presentationControls" class="presentation-controls no-print">
        <button id="presPrevBtn" class="pres-btn"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="presPageNum">1 / 10</span>
        <button id="presNextBtn" class="pres-btn"><i class="fa-solid fa-chevron-right"></i></button>
        <button id="presExitBtn" class="pres-btn exit-pres-btn" title="Exit Presentation"><i class="fa-solid fa-compress"></i></button>
    </div>
</body>
</html>
